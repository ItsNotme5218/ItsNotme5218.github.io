<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ben's Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Styles for Frosted Glass Island & Gradient Background -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Mostly white background */
            overflow-x: hidden; /* Prevents scrollbars from gradient blobs */
            padding: 2rem 1rem; /* Padding to ensure island doesn't touch screen edges */
        }

        /* The frosted glass effect for the main island - MORE TRANSPARENT */
        .frosted-glass-island {
            background: rgba(255, 255, 255, 0.45); /* Alpha value lowered from 0.65 to 0.45 */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px); /* For Safari */
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        
        /* The decorative gradient blobs in the background */
        .gradient-blob {
            position: fixed; /* Fixed so they don't scroll with the page */
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.6; /* Increased opacity slightly for more vibrant color */
            will-change: transform;
            animation: move 20s infinite alternate;
        }

        /* Blobs animation */
        @keyframes move {
            0% { transform: translate(-20%, -10%) scale(1); }
            100% { transform: translate(20%, 10%) scale(1.2); }
        }

        /* Styles for making the iframe responsive */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <!-- Decorative Gradient Blobs -->
    <div class="gradient-blob" style="background-color: #818cf8; top: -10%; left: -10%;"></div>
    <div class="gradient-blob" style="background-color: #f472b6; bottom: -10%; right: -10%; animation-delay: -5s;"></div>
    <div class="gradient-blob" style="background-color: #60a5fa; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s;"></div>

    <!-- Main Content Island -->
    <div class="frosted-glass-island w-full max-w-5xl mx-auto rounded-3xl overflow-hidden">
        
        <!-- Header / Navigation -->
        <header class="border-b border-white/20">
            <nav class="container mx-auto px-6 md:px-10 py-4 flex justify-between items-center">
                <!-- Name/Logo -->
                <a href="#" class="text-2xl font-bold text-gray-800">
                    Ben's Portfolio
                </a>
                <!-- Navigation Links -->
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-indigo-600 transition-colors font-medium">Home</a>
                    <a href="about.html" class="text-gray-700 hover:text-indigo-600 transition-colors font-medium">About</a>
                    <a href="#projects" class="text-gray-700 hover:text-indigo-600 transition-colors font-medium">Projects</a>
                </div>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main class="p-6 md:p-10">
            <!-- Hero Section -->
            <section class="text-center py-12 md:py-20">
                <h1 class="text-5xl md:text-7xl font-extrabold leading-tight mb-4">
                    Hi my name is <span class="text-indigo-600">Ben</span>
                </h1>
                <p class="text-lg md:text-xl text-gray-700 max-w-2xl mx-auto mb-8">
                    And I do <span class="text-indigo-600">Motion Graphics</span> and <span class="text-indigo-600">Video Editing</span>. Welcome to my personal space on the web.
                </p>
            </section>

            <!-- Projects Section with Embedded Video -->
            <section id="projects" class="pb-12 md:pb-20">
                <div class="text-center mb-10">
                    <h2 class="text-3xl md:text-4xl font-bold">My lastest project</h2>
                </div>
                
                <!-- Video Player -->
                <div class="max-w-4xl mx-auto">
                    <div class="video-container rounded-2xl shadow-xl overflow-hidden border border-white/20">
                        <iframe
                            src="https://drive.google.com/file/d/1uQPoCaZqQwfVgkUOc_bKaNUXez-4DN-Q/preview"
                            frameborder="0"
                            allow="autoplay; encrypted-media"
                            allowfullscreen="true">
                        </iframe>
                    </div>
                </div>
            </section>
        </main>
        
        <!-- Footer -->
        <footer class="bg-black/5 text-gray-700 py-6 px-6 md:px-10 text-center">
             <p>&copy; 2025 Ben &bull; <a href="mailto:benbach5218@gmail.com" class="hover:text-indigo-600">benbach5218@gmail.com</a></p>
        </footer>
    </div>

</body>
</html>
